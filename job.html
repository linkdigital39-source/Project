            <h2>KerjaDekat</h2>

    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Header -->
    <header class="header">
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxNCIgZmlsbD0iIzAwNjVDQyIgc3Ryb2tlPSIjMDA0Mzg1IiBzdHJva2Utd2lkdGg9IjEuNSIvPjxyZWN0IHg9IjEwIiB5PSIxMCIgd2lkdGg9IjEyIiBoZWlnaHQ9IjEyIiBmaWxsPSIjRkZCODFDIiByeD0iMS41Ii8+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMS41IiBmaWxsPSIjMDA2NUNDIi8+PC9zdmc+" alt="KerjaDekat" class="logo-icon">
            <span class="logo-text">KerjaDekat</span>
        </div>
        <button class="user-menu-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i></button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header Section -->
        <section class="page-header">
            <h1><i class="fas fa-briefcase"></i> Lowongan Kerja</h1>
            <p>Temukan pekerjaan yang sesuai dengan keahlian Anda</p>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-group">
                <input type="text" id="searchInput" class="search-input" placeholder="Cari lowongan kerja..." onkeyup="filterJobs()">
                <select id="sortSelect" class="sort-select" onchange="filterJobs()">
                    <option value="recent">Terbaru</option>
                    <option value="popular">Populer</option>
                    <option value="pricelow">Harga Rendah</option>
                    <option value="pricehigh">Harga Tinggi</option>
                </select>
            </div>
            <a href="create-job.html" class="btn-primary"><i class="fas fa-plus"></i> Buat Lowongan</a>
        </section>

        <!-- Jobs List -->
        <section class="jobs-section">
            <div class="jobs-container" id="jobsContainer">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat lowongan...</div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 KerjaDekat. Semua hak dilindungi.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script>
        let allJobs = [];
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await checkAuth();
            loadJobs(renderJobs);
        });

        function renderJobs(jobs) {
            allJobs = jobs;
            const container = document.getElementById('jobsContainer');
            
            if (jobs.length === 0) {
                container.innerHTML = '<p class="no-data">Tidak ada lowongan kerja saat ini</p>';
                return;
            }

            container.innerHTML = jobs.map(job => {
                const createdDate = job.createdAt?.toDate?.() || new Date();
                return `
                    <div class="job-card">
                        <div class="job-header">
                            <div class="employer-info">
                                <img src="${job.userPhoto || createAvatarUrl(job.userName)}" alt="${job.userName}" class="avatar">
                                <div>
                                    <h4>${job.userName}</h4>
                                    <div class="rating">
                                        <span class="stars">${getStarRating(job.userRating || 0)}</span>
                                        <span class="rating-value">${(job.userRating || 0).toFixed(1)}</span>
                                    </div>
                                </div>
                            </div>
                            ${job.isVerified ? '<span class="badge badge-verified"><i class="fas fa-check-circle"></i> Terverifikasi</span>' : ''}
                        </div>
                        <div class="job-content">
                            <h3>${job.title}</h3>
                            <p class="description">${job.description?.substring(0, 120)}...</p>
                            <div class="job-meta">
                                <span><i class="fas fa-map-marker-alt"></i> ${job.location}</span>
                                <span><i class="fas fa-briefcase"></i> ${job.category}</span>
                            </div>
                        </div>
                        <div class="job-footer">
                            <span class="budget">${formatPrice(job.budget)}</span>
                            <div class="job-stats">
                                <span><i class="fas fa-users"></i> ${job.totalApplicants || 0} Pelamar</span>
                                <span class="time">${formatDate(createdDate)}</span>
                            </div>
                            <a href="detail-job.html?id=${job.id}" class="btn-outline">Lihat Detail</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterJobs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;

            let filtered = allJobs.filter(job => 
                job.title.toLowerCase().includes(searchTerm) ||
                job.description.toLowerCase().includes(searchTerm) ||
                job.category.toLowerCase().includes(searchTerm)
            );

            // Sort
            if (sortBy === 'popular') {
                filtered.sort((a, b) => (b.totalApplicants || 0) - (a.totalApplicants || 0));
            } else if (sortBy === 'pricelow') {
                filtered.sort((a, b) => a.budget - b.budget);
            } else if (sortBy === 'pricehigh') {
                filtered.sort((a, b) => b.budget - a.budget);
            }

            renderJobs(filtered);
        }
    </script>
</body>
</html>
